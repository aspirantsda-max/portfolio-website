<!DOCTYPE html>
<html>
<head>
<title>CENSS Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    font-family:'Segoe UI';
    background: linear-gradient(135deg,#020617,#0f172a);
    color:white;
}

#loginPage {
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card {
    background:rgba(255,255,255,0.1);
    padding:30px;
    border-radius:15px;
    text-align:center;
}

#dashboard { display:none; }

.sidebar {
    width:220px;
    position:fixed;
    height:100%;
    background:#0f172a;
    padding:20px;
}

.nav-item {
    background:#1e293b;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    cursor:pointer;
}

.main {
    margin-left:240px;
    padding:20px;
}

.topbar {
    display:flex;
    justify-content:flex-end;
    gap:10px;
    flex-wrap:wrap;
}

input, select {
    padding:8px;
    border-radius:6px;
    border:none;
}

button {
    padding:8px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.upload { background:#22c55e; }
.logout { background:#f97316; }
.delete { background:#ef4444; }

.file-btn {
    background:#3b82f6;
    padding:8px 15px;
    border-radius:6px;
    cursor:pointer;
}
.file-btn input { display:none; }

.card-box {
    background:#1e293b;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
    cursor:pointer;
}

.file {
    display:flex;
    justify-content:space-between;
    background:#334155;
    padding:8px;
    margin:5px 0;
    border-radius:6px;
}

#viewer {
    margin-top:20px;
    padding:10px;
    background:#1e293b;
    border-radius:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
<div class="card">
<h2>🔐 CENSS Login</h2>
<input id="username" placeholder="Username"><br><br>
<input id="password" type="password"><br><br>
<button onclick="login()">Login</button>
<p id="error"></p>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<div class="sidebar">
<div class="nav-item" onclick="openFolder('Power BI')">📈 Power BI</div>
<div class="nav-item" onclick="openFolder('Excel')">📊 Excel</div>
<div class="nav-item" onclick="openFolder('SQL')">🗄️ SQL</div>
<div class="nav-item" onclick="openFolder('Python')">🐍 Python</div>
<div class="nav-item" onclick="openFolder('Tableau')">📉 Tableau</div>
<div class="nav-item" onclick="openFolder('Data Sets')">📁 Data Sets</div>
</div>

<div class="main">

<div class="topbar">
<input type="text" id="searchInput" placeholder="🔍 Search files..." onkeyup="applyFilter()">

<select id="sortType" onchange="applyFilter()">
<option value="az">A → Z</option>
<option value="za">Z → A</option>
<option value="new">Newest</option>
<option value="old">Oldest</option>
</select>

<label class="file-btn">
📁 Choose File
<input type="file" id="fileInput">
</label>

<button class="upload" onclick="uploadFile()">Upload</button>
<button class="logout" onclick="logout()">Logout</button>
</div>

<h2>Dashboard</h2>

<canvas id="chart"></canvas>

<div id="content"></div>
<div id="viewer"></div>

</div>
</div>

<script>

const users = {"censs":"censs@1234"};
const members = ["Chandana","Eswari","Narendra","Sandhya","Saathvik"];

let currentFolder="", currentSub="";
let storage = JSON.parse(localStorage.getItem("storage")) || {};
let chartInstance=null;

// LOGIN
function login(){
    if(users[username.value]===password.value){
        loginPage.style.display="none";
        dashboard.style.display="block";
    } else {
        error.innerText="Invalid Credentials";
    }
}

// LOGOUT
function logout(){ location.reload(); }

// OPEN FOLDER
function openFolder(name){
    currentFolder=name;
    currentSub="";

    let list=name==="Data Sets"
    ? ["Raw Dataset","Cleaned Dataset"]
    : members;

    let html="";
    let labels=[];
    let data=[];

    list.forEach(sub=>{
        let count=(storage[name]&&storage[name][sub])?storage[name][sub].length:0;

        labels.push(sub);
        data.push(count);

        html+=`<div class="card-box" onclick="openSub('${sub}')">
        📂 ${sub} (${count})
        </div>`;
    });

    content.innerHTML=html;
    updateChart(labels,data);
}

// OPEN SUB
function openSub(name){
    currentSub=name;
    applyFilter();
}

// SEARCH + SORT
function applyFilter(){

    if(!currentSub) return;

    let search=document.getElementById("searchInput").value.toLowerCase();
    let sort=document.getElementById("sortType").value;

    let files=(storage[currentFolder]&&storage[currentFolder][currentSub])||[];

    let filtered = files.map((f,i)=>({...f,index:i}));

    filtered = filtered.filter(f=>f.name.toLowerCase().includes(search));

    // SORT
    if(sort==="az") filtered.sort((a,b)=>a.name.localeCompare(b.name));
    if(sort==="za") filtered.sort((a,b)=>b.name.localeCompare(a.name));
    if(sort==="new") filtered.reverse();
    if(sort==="old") filtered.sort((a,b)=>a.index - b.index);

    let html=`<h3>📁 ${currentSub}</h3>`;

    filtered.forEach(f=>{
        html+=`
        <div class="file">
        <span onclick="openFile('${f.data}','${f.type}')">${f.name}</span>
        <button class="delete" onclick="deleteFile(${f.index})">❌</button>
        </div>`;
    });

    html+=`<br><button onclick="openFolder('${currentFolder}')">⬅ Back</button>`;
    content.innerHTML=html;
}

// UPLOAD
function uploadFile(){
    let file=fileInput.files[0];
    if(!file||!currentSub) return alert("Select subfolder");

    let reader=new FileReader();

    reader.onload=function(e){
        if(!storage[currentFolder]) storage[currentFolder]={};
        if(!storage[currentFolder][currentSub]) storage[currentFolder][currentSub]=[];

        storage[currentFolder][currentSub].push({
            name:file.name,
            data:e.target.result,
            type:file.type
        });

        localStorage.setItem("storage",JSON.stringify(storage));
        openSub(currentSub);
        openFolder(currentFolder);
    };

    reader.readAsDataURL(file);
}

// DELETE
function deleteFile(index){
    storage[currentFolder][currentSub].splice(index,1);
    localStorage.setItem("storage",JSON.stringify(storage));
    openSub(currentSub);
    openFolder(currentFolder);
}

// OPEN FILE
function openFile(data,type){
    if(type.includes("image")){
        viewer.innerHTML=`<img src="${data}" style="width:100%">`;
    } else {
        viewer.innerHTML=`<iframe src="${data}" width="100%" height="500"></iframe>`;
    }
}

// CHART
function updateChart(labels,data){

    if(chartInstance){
        chartInstance.destroy();
    }

    chartInstance=new Chart(document.getElementById("chart"),{
        type:'bar',
        data:{
            labels:labels,
            datasets:[{
                label:"Number of Files",
                data:data
            }]
        },
        options:{
            scales:{
                y:{
                    beginAtZero:true,
                    ticks:{ precision:0 }
                }
            }
        }
    });
}

</script>

</body>
</html>
